<ion-header class="hide-header">
  <ion-select
  #selectRef
  interface="action-sheet"
  (ionCancel)="onSelectCancel()"
  placeholder="Selecciona una red"
  (ionChange)="onSelectChange($event)"
  
>
  <ion-select-option value=1>{{ 'select-useroptions-modal.Bloquear usuario' | translate }}</ion-select-option>
  <ion-select-option value=2>{{ 'select-useroptions-modal.Reportar usuario' | translate }}</ion-select-option>
  <ion-select-option value=3 *ngIf="fromIndividualChat">{{ 'Eliminar chat' | translate }}</ion-select-option>
</ion-select>
</ion-header>
