<ion-header id="header" [ngClass]="{'android-style': isAndroid, 'ios-style': isIOS}">
  <div class="header-top">
    <ion-icon (click)="goBack()" id="iconLeft" src="assets/icons/arrowBack.svg"></ion-icon>
    <h5 (click)="goBack()" class="header-title">{{ 'usersetags.TAGS' | translate }}</h5>
  </div>
</ion-header>

<ion-content>
  
  <div *ngFor="let ul of userLabels" class="etiqueta">{{ul?.value}}</div>
  

</ion-content>
