<ion-header class="hide-header">
  <ion-select
  #selectRef
  interface="action-sheet"
  (ionCancel)="onSelectCancel()"
  placeholder="Selecciona una red"
  (ionChange)="onSelectChange($event)">
  <ion-select-option *ngIf="mediaType!=null && mediaType =='imagen'" value=1>{{ 'Editar' | translate }}</ion-select-option>
  <ion-select-option value=2>{{ 'Eliminar' | translate }}</ion-select-option>
</ion-select>
</ion-header>
