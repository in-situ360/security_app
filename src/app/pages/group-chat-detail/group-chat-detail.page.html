<ion-header class="mainheader">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button mode="md" defaultHref="/" icon="chevron-back-outline"></ion-back-button>
    </ion-buttons>
    <img alt="" class="asistente-icono" src="assets/imgs/foto-perfil-usuario.png">
    <div class="asistente-header">
      <ion-title class="virtual-assist">Grupo 1</ion-title>
      <p class="state">Marta S., Juan R., Marcos A., Tú</p>
    </div>
    <ion-buttons slot="end">
      <ion-button class="chatbutton" slot="icononly">
        <ion-icon name="ellipsis-vertical"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="chat">
    <div class="chat-date">
      <ion-label>Hoy</ion-label>
    </div>
    <div class="chat-member">
      <img alt="" class="asistente-icono" src="assets/imgs/img1.png">
      <div class="chat-bubble">
        <ion-label class="name">Marcos Alda</ion-label>
        <ion-label>Ya lo tengo, ¡gracias!</ion-label>
      </div>
    </div>
    <p class="hour">10:04</p>
    <div class="chat2">
      <div class="chat-bubble2">
        <ion-label>@Marta, ¡importante!</ion-label>
      </div>
      <div class="chat-bubble2">
        <ion-label>Te he dejado unos documentos en la carpeta “Wedding Venue”</ion-label>
      </div>
    </div>
    <p class="hour2">10:04</p>
    <div class="chat-member">
      <img alt="" class="asistente-icono" src="assets/imgs/img2.png">
      <div>
        <div class="chat-bubble">
          <ion-label class="name">Marta Suarez</ion-label>
          <ion-label>Hola, buenos días!</ion-label>
        </div>
        <div class="chat-bubble">
          <ion-label>¡Perfecto!</ion-label>
        </div>
      </div>
    </div>
    <p class="hour">10:04</p>
  </div>
</ion-content>

<ion-footer>
  <ion-item>
    <ion-label>
      <ion-icon name="camera-outline"></ion-icon>
    </ion-label>
    <ion-input placeholder="Escribe un mensaje…"></ion-input>
  </ion-item>
</ion-footer>
