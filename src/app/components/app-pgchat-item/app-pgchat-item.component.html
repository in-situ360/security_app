<div [ngClass]="(icon) ? 'item-left' : 'item-right'"
(mousedown)="startPress()" 
(mouseup)="cancelPress()" 
(mouseleave)="cancelPress()"
(touchstart)="startPress()" 
(touchend)="cancelPress()">

  <div [ngClass]="(icon) ? 'left' : 'right'">
    <ion-avatar *ngIf="icon">
      <img [src]="icon">
    </ion-avatar>

    <div *ngIf="image && !archive && !urlarchiveaudio" class="message">
      <img [src]="image">
      <p>{{text}}</p>
      
      
    </div>

    <div *ngIf="urlarchiveaudio" class="message">
      <!-- Contenedor para el botón de reproducción/pausa y el WaveSurfer -->
      <div class="audio-controls">
        <button (click)="togglePlayback()" class="play-pause-button">
          <ion-icon [name]="isPlaying ? 'pause' : 'play'"></ion-icon>
        </button>
        <div id="waveform-{{id}}" class="waveform-container"></div>
      </div>
    </div>

    <!--<div *ngIf="!image && !archive && !urlarchiveaudio"  class="message">
      
      <p>{{text}}</p>
    </div>-->
    <div *ngIf="!image && !archive && !urlarchiveaudio" class="message">
      <p>
        <ng-container *ngFor="let t of tokenizeText(text)">
          <ng-container *ngIf="t.link; else plain">
            <a 
            (pointerdown)="onLinkPointerDown($event)"
            (pointerup)="onLinkPointerUp(t.text, $event)"
            (pointerleave)="onLinkPointerCancel()"
            (pointercancel)="onLinkPointerCancel()"
          >
            {{ t.text }}
          </a>
          </ng-container>
          <ng-template #plain>{{ t.text }}</ng-template>
        </ng-container>
      </p>
    </div>


    <div *ngIf="archive && !urlarchiveaudio" (click)="openPDF(archive)" class="message">
     
      <div style="width: 100%; height: 103px; overflow: hidden; margin-top: 10px;">
        <img [src]="pdfImagen" alt="Vista previa del PDF" />
      </div>
      <div style="width: 100%; margin-top: 10px;">
        
        <p style="">{{ pdfdata?.name }} . {{ formatFileSize(pdfdata?.size) }} </p>
        

      </div>
     
    </div>

  </div>

  <span [ngClass]="{'date-media-left': icon && (image || archive)}" class="date">
    {{date | date:'h:mm a'}}
  </span>

</div>
